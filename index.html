<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Semester Project 1 | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="utf-8">
    <meta name="description" content="Placeholder description for the home page.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/rainy-days-logo/favicon.ico">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
  </head>
  <body>
    <a class="skip-link" href="#main"></a>

    <div class="topbar">
      <div class="topbar-inner">
        <nav class="top-nav">
          <ul></ul>
        </nav>
        <div class="country-select"></div>
      </div>
    </div>

    <header>
      <div class="header-inner">
        <a href="index.html" class="logo"></a>

        <nav class="main-nav" aria-label="Desktop navigation">
          <ul class="nav-list"></ul>
        </nav>

        <div class="header-icons"></div>
      </div>

      <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">
      <nav class="main-nav-mobile" aria-label="Mobile navigation">
        <ul class="nav-list-mobile"></ul>
      </nav>
    </header>

    <main id="main">
      <section class="hero-banner" aria-label="Autumn Collection Promotion"></section>

      <div class="container">
        <div class="home-grid">
          <div class="left-column">
            <section class="shop-categories category-grid" aria-label="Shop by Category"></section>
            <article class="product-card featured-one"></article>
          </div>

          <div class="right-column">
            <article class="product-card featured-two"></article>
            <section class="shop-promos promo-grid" aria-label="Shop by Promos"></section>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-inner">
        <div class="footer-newsletter"></div>

        <nav class="footer-nav" aria-label="Footer navigation">
          <ul></ul>
        </nav>

        <div class="footer-icons"></div>

        <a href="index.html" class="logo-footer"></a>
      </div>
    </footer>

    <div class="bottombar">
      <div class="bottombar-inner">
        <nav class="bottom-nav">
          <ul></ul>
        </nav>
        <div class="country-select"></div>
      </div>
    </div>
  </body>
</html>
