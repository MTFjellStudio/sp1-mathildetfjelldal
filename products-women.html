<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Semester Project 1 | Women</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="utf-8">
    <meta name="description" content="Placeholder description for the women products page.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/rainy-days-logo/favicon.ico">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
  </head>
  <body>
    <a class="skip-link" href="#main"></a>

    <div class="topbar">
      <div class="topbar-inner">
        <nav class="top-nav">
          <ul></ul>
        </nav>
        <div class="country-select"></div>
      </div>
    </div>

    <header>
      <div class="header-inner">
        <a href="index.html" class="logo"></a>

        <nav class="main-nav" aria-label="Desktop navigation">
          <ul class="nav-list"></ul>
        </nav>

        <div class="header-icons"></div>
      </div>

      <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">
      <nav class="main-nav-mobile" aria-label="Mobile navigation">
        <ul class="nav-list-mobile"></ul>
      </nav>
    </header>

    <main id="main">
      <div class="container">
        <div class="page-header">
          <div class="breadcrumbs"></div>
          <h2></h2>
          <p class="product-count"></p>
          <div class="toolbar">
            <div class="dropdown-item filter-dropdown"></div>
            <div class="dropdown-item sort-dropdown"></div>
          </div>
        </div>

        <section class="product-grid">
          <h2 class="sr-only"></h2>
          <article class="product-card"></article>
        </section>
      </div>

    <footer>
      <div class="footer-inner">
        <div class="footer-newsletter"></div>

        <nav class="footer-nav" aria-label="Footer navigation">
          <ul></ul>
        </nav>

        <div class="footer-icons"></div>

        <a href="index.html" class="logo-footer"></a>
      </div>
    </footer>

    <div class="bottombar">
      <div class="bottombar-inner">
        <nav class="bottom-nav">
          <ul></ul>
        </nav>
        <div class="country-select"></div>
      </div>
    </div>
